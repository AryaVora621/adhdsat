<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="15" fill="#221e1a"/>
  
  <!-- Horizontal Pencil (Teal) -->
  <g transform="translate(0, 4)">
    <!-- Body -->
    <rect x="12" y="12" width="30" height="12" fill="#46b79f" />
    <rect x="12" y="12" width="4" height="12" fill="#ffc93d" /> <!-- Eraser -->
    <rect x="16" y="12" width="2" height="12" fill="#b0a79c" /> <!-- Metal Band -->
    
    <!-- Tip -->
    <path d="M42 12 L52 18 L42 24 Z" fill="#f4efe7" />
    <polygon points="49,16.2 52,18 49,19.8" fill="#46b79f" /> <!-- Lead tip -->
    
    <!-- Lines on pencil body -->
    <rect x="18" y="15" width="24" height="2" fill="#2e7d6f" opacity="0.3" />
    <rect x="18" y="19" width="24" height="2" fill="#2e7d6f" opacity="0.3" />
  </g>

  <!-- Vertical Pencil (Terracotta) -->
  <g transform="translate(0, 4)">
    <!-- Body -->
    <rect x="26" y="24" width="12" height="20" fill="#ff7a4d" />
    
    <!-- Tip -->
    <path d="M26 44 L32 54 L38 44 Z" fill="#f4efe7" />
    <polygon points="30.2,51 32,54 33.8,51" fill="#ff7a4d" /> <!-- Lead tip -->
    
    <!-- Lines on pencil body -->
    <rect x="29" y="24" width="2" height="20" fill="#cf522d" opacity="0.3" />
    <rect x="33" y="24" width="2" height="20" fill="#cf522d" opacity="0.3" />
  </g>
</svg>
